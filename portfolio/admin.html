<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Admin — Contact Messages</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0d0d;color:#f0f0f0;font-family:'Courier New',monospace;padding:40px 24px;min-height:100vh}
h1{font-size:1.4rem;color:#00d4ff;margin-bottom:4px}
.sub{color:#8a8a8a;font-size:.8rem;margin-bottom:32px}
.msg-card{background:#151515;border:1px solid #2a2a2a;border-radius:6px;padding:20px;margin-bottom:16px;transition:border-color .2s}
.msg-card:hover{border-color:#00d4ff}
.meta{display:flex;gap:16px;margin-bottom:12px;flex-wrap:wrap}
.name{color:#00d4ff;font-weight:600}
.email{color:#8a8a8a;font-size:.85rem}
.date{color:#444;font-size:.75rem;margin-left:auto}
.body{color:#ccc;font-size:.9rem;line-height:1.6;white-space:pre-wrap;border-left:2px solid #2a2a2a;padding-left:12px}
.empty{color:#444;text-align:center;padding:60px;font-size:.9rem}
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.count{background:#1e1e1e;border:1px solid #2a2a2a;border-radius:4px;padding:6px 14px;font-size:.78rem;color:#8a8a8a}
.btn-clear{padding:8px 16px;border:1px solid #f85149;color:#f85149;background:transparent;border-radius:4px;font-family:inherit;font-size:.78rem;cursor:pointer;transition:background .2s}
.btn-clear:hover{background:rgba(248,81,73,.1)}
.badge{display:inline-block;width:8px;height:8px;border-radius:50%;background:#22c55e;margin-right:6px}
</style>
</head>
<body>
<div class="top-bar">
  <div>
    <h1>📬 Contact Messages</h1>
    <div class="sub">Messages submitted through portfolio contact form</div>
  </div>
  <div style="display:flex;gap:10px;align-items:center">
    <div class="count" id="count-badge"></div>
    <button class="btn-clear" onclick="clearAll()">Clear All</button>
  </div>
</div>
<div id="messages-list"></div>

<script>
function load(){
  var list=document.getElementById('messages-list');
  var badge=document.getElementById('count-badge');
  var messages=JSON.parse(localStorage.getItem('portfolio_messages')||'[]').reverse();
  badge.innerHTML='<span class="badge"></span>'+messages.length+' message'+(messages.length!==1?'s':'');
  if(!messages.length){
    list.innerHTML='<div class="empty">No messages yet.<br><br>Messages submitted through your portfolio contact form will appear here.</div>';
    return;
  }
  list.innerHTML=messages.map(function(m,i){
    var d=new Date(m.date);
    var dateStr=d.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'})+' '+d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
    return '<div class="msg-card"><div class="meta"><span class="name">'+esc(m.name)+'</span><span class="email">'+esc(m.email)+'</span><span class="date">'+dateStr+'</span></div><div class="body">'+esc(m.message)+'</div></div>';
  }).join('');
}
function esc(str){var d=document.createElement('div');d.textContent=str;return d.innerHTML;}
function clearAll(){if(confirm('Delete all messages? This cannot be undone.')){localStorage.removeItem('portfolio_messages');load();}}
load();
</script>
</body>
</html>
