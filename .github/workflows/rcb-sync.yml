name: IPL 2026 Live Data Sync

on:
  schedule:
    # Every 30 min during match hours (14:00-20:00 UTC = 7:30 PM - 1:30 AM IST)
    - cron: '*/30 14-20 * * *'
    # Every 3 hours rest of day
    - cron: '0 */3 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Sync IPL 2026 Data
        run: node IPL-RCB/scripts/sync-cricapi.js
        working-directory: ${{ github.workspace }}

      - name: Commit & Push if data changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add IPL-RCB/data/ipl2026.json IPL-RCB/js/ipl-data.js
          git diff --staged --quiet || git commit -m "sync: IPL 2026 live data update [skip ci]"
          git push
